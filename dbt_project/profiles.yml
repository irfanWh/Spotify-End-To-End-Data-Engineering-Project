spotify_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'spotify_user') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'spotify_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'spotify_platform') }}"
      schema: public
      threads: 4
